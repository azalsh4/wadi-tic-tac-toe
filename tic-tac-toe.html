<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f13;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e8e8f0;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      margin-bottom: 1.5rem;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .scoreboard {
      display: flex;
      gap: 2rem;
      margin-bottom: 1.5rem;
    }

    .score-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0.6rem 1.4rem;
      border-radius: 12px;
      background: #1a1a24;
      border: 2px solid transparent;
      transition: border-color 0.2s;
      min-width: 80px;
    }

    .score-card.active-x { border-color: #a78bfa; }
    .score-card.active-o { border-color: #60a5fa; }

    .score-label {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 2px;
    }

    .score-player { font-size: 1.1rem; font-weight: 700; }
    .score-player.x { color: #a78bfa; }
    .score-player.o { color: #60a5fa; }

    .score-value { font-size: 1.4rem; font-weight: 700; }

    .status {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      margin-bottom: 1.2rem;
      height: 1.4em;
      transition: color 0.2s;
    }

    .status.x-turn { color: #a78bfa; }
    .status.o-turn { color: #60a5fa; }
    .status.win    { color: #34d399; }
    .status.draw   { color: #fbbf24; }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 10px;
    }

    .cell {
      background: #1a1a24;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: 800;
      cursor: pointer;
      border: 2px solid #2a2a38;
      transition: background 0.15s, transform 0.1s, border-color 0.15s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #22223a;
      border-color: #3a3a58;
      transform: scale(1.04);
    }

    .cell.x { color: #a78bfa; border-color: #3d2f6e; }
    .cell.o { color: #60a5fa; border-color: #1e3a5f; }

    .cell.winning {
      background: #1e1e30;
      border-color: #34d399 !important;
      color: #34d399 !important;
      animation: pulse 0.6s ease-out;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .cell.taken { cursor: default; }

    button {
      margin-top: 1.8rem;
      padding: 0.65rem 2rem;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:hover { opacity: 0.88; transform: translateY(-1px); }
    button:active { transform: translateY(0); }
  </style>
</head>
<body>
  <h1>TIC-TAC-TOE</h1>

  <div class="scoreboard">
    <div class="score-card" id="card-x">
      <span class="score-label">Player</span>
      <span class="score-player x">X</span>
      <span class="score-value" id="score-x">0</span>
    </div>
    <div class="score-card" id="card-draw">
      <span class="score-label">Draws</span>
      <span class="score-player" style="color:#888">—</span>
      <span class="score-value" id="score-draw">0</span>
    </div>
    <div class="score-card" id="card-o">
      <span class="score-label">Player</span>
      <span class="score-player o">O</span>
      <span class="score-value" id="score-o">0</span>
    </div>
  </div>

  <div class="status x-turn" id="status">X's turn</div>

  <div class="board" id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="restart">New Game</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, over;
    let scores = { X: 0, O: 0, draw: 0 };

    const cells   = document.querySelectorAll('.cell');
    const status  = document.getElementById('status');
    const cardX   = document.getElementById('card-x');
    const cardO   = document.getElementById('card-o');
    const sX      = document.getElementById('score-x');
    const sO      = document.getElementById('score-o');
    const sDraw   = document.getElementById('score-draw');

    function init() {
      board   = Array(9).fill(null);
      current = 'X';
      over    = false;
      cells.forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
      setStatus(`${current}'s turn`, current === 'X' ? 'x-turn' : 'o-turn');
      updateActiveCard();
    }

    function setStatus(text, cls) {
      status.textContent = text;
      status.className = `status ${cls}`;
    }

    function updateActiveCard() {
      cardX.className = 'score-card' + (current === 'X' && !over ? ' active-x' : '');
      cardO.className = 'score-card' + (current === 'O' && !over ? ' active-o' : '');
    }

    function checkWin() {
      for (const [a,b,c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return [a, b, c];
        }
      }
      return null;
    }

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        const i = +cell.dataset.i;
        if (over || board[i]) return;

        board[i] = current;
        cell.textContent = current;
        cell.classList.add('taken', current.toLowerCase());

        const win = checkWin();
        if (win) {
          win.forEach(idx => cells[idx].classList.add('winning'));
          scores[current]++;
          sX.textContent = scores.X;
          sO.textContent = scores.O;
          over = true;
          setStatus(`${current} wins! 🎉`, 'win');
          cardX.className = 'score-card';
          cardO.className = 'score-card';
          return;
        }

        if (board.every(Boolean)) {
          scores.draw++;
          sDraw.textContent = scores.draw;
          over = true;
          setStatus("It's a draw!", 'draw');
          cardX.className = 'score-card';
          cardO.className = 'score-card';
          return;
        }

        current = current === 'X' ? 'O' : 'X';
        setStatus(`${current}'s turn`, current === 'X' ? 'x-turn' : 'o-turn');
        updateActiveCard();
      });
    });

    document.getElementById('restart').addEventListener('click', init);

    init();
  </script>
</body>
</html>
